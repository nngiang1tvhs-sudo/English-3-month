<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90 Ngày Luyện Nghe - Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Be Vietnam Pro"', 'sans-serif'] },
                    colors: {
                        dash: {
                            bg: '#F8FAFC',
                            card: '#FFFFFF',
                            text: '#0F172A',
                            sub: '#64748B',
                            primary: '#F59E0B', // Amber 500 (Vàng cam chủ đạo)
                            primaryHover: '#D97706',
                            success: '#10B981',
                            danger: '#EF4444',
                        }
                    },
                    boxShadow: {
                        'soft': '0px 10px 30px rgba(0, 0, 0, 0.04)',
                        'btn': '0px 4px 14px rgba(245, 158, 11, 0.25)'
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { 
            background-color: theme('colors.dash.bg'); 
            color: theme('colors.dash.text');
            -webkit-tap-highlight-color: transparent; 
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        .dashboard-card {
            background-color: theme('colors.dash.card');
            border-radius: 20px;
            box-shadow: theme('boxShadow.soft');
            border: 1px solid rgba(0,0,0,0.03);
        }

        .quest-card { transition: all 0.3s; }
        .quest-card.locked { opacity: 0.6; pointer-events: none; filter: grayscale(50%); }
        .quest-card.completed { border-left: 6px solid theme('colors.dash.success'); }
        
        .quest-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease-in-out; }
        .quest-card.open .quest-content { grid-template-rows: 1fr; }
        .quest-inner { overflow: hidden; }

        /* UI Từ Điển giống thiết kế */
        .search-input-wrapper { position: relative; width: 100%; }
        .search-input {
            width: 100%;
            background-color: #FFFFFF;
            border: 1px solid #F59E0B; /* Vàng cam */
            color: #1E293B;
            font-size: 0.875rem;
            border-radius: 12px;
            padding: 0.75rem 2.5rem 0.75rem 1rem;
            transition: all 0.2s;
        }
        .search-input:focus { outline: none; box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2); }
        .search-input::placeholder { color: #94A3B8; }

        .dict-result-box {
            background-color: #FFFBEB; /* Vàng siêu nhạt */
            border: 1px solid #FDE68A;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
        }
        
        .btn-outline-amber {
            border: 1px solid #F59E0B;
            color: #F59E0B;
            background: white;
            font-weight: 700;
            padding: 0.35rem 0.75rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-outline-amber:hover { background: #FFFBEB; }

        #userNotes { resize: vertical; min-height: 200px; color: #0F172A; }
        #userNotes:focus { outline: none; border-color: theme('colors.dash.primary'); }
        
        .modal-enter { opacity: 1 !important; pointer-events: auto !important; }
        .modal-enter .modal-box { transform: scale(1) !important; opacity: 1 !important; }
    </style>
</head>
<body class="antialiased pb-20 lg:pb-10">

    <!-- CÂU ĐỘNG LỰC ĐẦU TRANG -->
    <div class="bg-gradient-to-r from-amber-400 to-orange-500 text-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-2.5 flex items-center justify-center gap-2">
            <i class="ph-fill ph-sparkle text-white text-lg"></i>
            <p class="text-xs md:text-sm font-semibold tracking-wide text-center">"Đừng mong đích đến sẽ thay đổi nếu như bạn không thay đổi con đường. Quất thôi!"</p>
        </div>
    </div>

    <!-- HEADER DASHBOARD -->
    <header class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-2xl bg-white shadow-soft flex items-center justify-center text-dash-primary border border-amber-100">
                    <i class="ph-fill ph-headphones text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight text-dash-text">Hệ Thống Luyện Nghe 90 Ngày</h1>
                    <p class="text-sm font-medium text-dash-sub" id="currentDateStr">Đang tải dữ liệu...</p>
                </div>
            </div>
            
            <div class="flex flex-wrap md:flex-nowrap gap-3 w-full lg:w-auto">
                <!-- Đồng hồ Tracker (Hiển thị Ca đang học) -->
                <div class="dashboard-card flex-1 px-4 py-3 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center shrink-0">
                        <i class="ph-bold ph-timer text-blue-500 text-xl"></i>
                    </div>
                    <div>
                        <div class="text-[10px] font-bold text-dash-sub uppercase" id="timerLabel">Thời gian học</div>
                        <div class="text-lg font-extrabold text-dash-text tabular-nums leading-none mt-0.5" id="timerDisplay">00:00</div>
                    </div>
                </div>
                
                <!-- Streak Tracker -->
                <div class="dashboard-card flex-1 px-4 py-3 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-red-50 flex items-center justify-center shrink-0">
                        <i class="ph-fill ph-fire text-dash-danger text-xl"></i>
                    </div>
                    <div>
                        <div class="text-[10px] font-bold text-dash-sub uppercase">Chuỗi ngày</div>
                        <div class="text-lg font-extrabold text-dash-text leading-none mt-0.5"><span id="streakCount">0</span> <span class="text-xs font-semibold text-dash-sub">ngày</span></div>
                    </div>
                </div>

                <!-- Khu Vườn Tiến Độ -->
                <div class="dashboard-card flex-1 px-4 py-3 flex items-center gap-3 min-w-[180px]">
                    <div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center shrink-0 text-2xl" id="treeIcon">🌱</div>
                    <div class="w-full">
                        <div class="text-[10px] font-bold text-dash-sub uppercase">Khu Vườn Tiến Độ</div>
                        <div class="text-sm font-extrabold text-dash-text leading-none mt-1" id="treeName">Hạt Mầm</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- THANH MENU GHIM -->
    <nav class="sticky top-0 z-40 bg-dash-bg/90 backdrop-blur-lg border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 flex gap-2 overflow-x-auto no-scrollbar py-3">
            <button onclick="switchTab('phase1', this)" class="tab-btn active px-6 py-2.5 rounded-full text-sm font-bold whitespace-nowrap transition-all bg-dash-primary text-white shadow-btn">
                Tháng 1 (1 - 30)
            </button>
            <button onclick="switchTab('phase2', this)" class="tab-btn px-6 py-2.5 rounded-full text-sm font-semibold whitespace-nowrap text-dash-sub hover:text-dash-text hover:bg-amber-50 hover:text-dash-primary transition-all bg-transparent">
                Tháng 2 (31 - 60)
            </button>
            <button onclick="switchTab('phase3', this)" class="tab-btn px-6 py-2.5 rounded-full text-sm font-semibold whitespace-nowrap text-dash-sub hover:text-dash-text hover:bg-amber-50 hover:text-dash-primary transition-all bg-transparent">
                Tháng 3 (61 - 90)
            </button>
        </div>
    </nav>

    <!-- KHU VỰC CHÍNH -->
    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- CỘT TRÁI: BÀI HỌC -->
        <div class="lg:col-span-2 space-y-6 relative">
            <section id="phase1" class="tab-content block space-y-4"><div id="phase1-container"></div></section>
            <section id="phase2" class="tab-content hidden space-y-4"><div id="phase2-container"></div></section>
            <section id="phase3" class="tab-content hidden space-y-4"><div id="phase3-container"></div></section>
        </div>

        <!-- CỘT PHẢI: TỪ ĐIỂN & GHI CHÚ -->
        <div class="lg:col-span-1">
            <div class="sticky top-24 space-y-6">
                
                <!-- Tra từ & Phiên âm (Chỉnh lại UI giống ảnh) -->
                <div class="dashboard-card p-5 bg-white">
                    <h3 class="font-extrabold text-[#0F172A] mb-4 flex items-center gap-2 text-[15px]">
                        <i class="ph-fill ph-translate text-[#F59E0B] text-xl"></i> Tra từ & Phiên âm
                    </h3>
                    <div class="search-input-wrapper">
                        <input type="text" id="dictInput" placeholder="Nhập từ tiếng Anh..." class="search-input" onkeypress="if(event.key === 'Enter') lookupWord()">
                        <button onclick="lookupWord()" class="absolute right-3 top-1/2 -translate-y-1/2 text-amber-500 hover:text-amber-600 transition-colors">
                            <i class="ph-bold ph-magnifying-glass text-lg"></i>
                        </button>
                    </div>
                    
                    <div id="dictResult" class="hidden"></div>
                </div>

                <!-- Sổ tay (Chỉnh UI giống ảnh) -->
                <div class="dashboard-card flex flex-col h-[500px]">
                    <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-white rounded-t-20">
                        <h3 class="font-extrabold text-[#0F172A] flex items-center gap-2 text-[15px]">
                            <i class="ph-fill ph-notebook text-[#F59E0B] text-xl"></i> Sổ tay Cá nhân
                        </h3>
                        <button onclick="saveNotes()" id="saveNoteBtn" class="text-xs font-bold text-white bg-[#F59E0B] px-4 py-2 rounded-lg hover:bg-orange-500 transition-colors">Lưu lại</button>
                    </div>
                    <textarea id="userNotes" class="flex-1 p-5 text-sm bg-transparent border-none resize-none font-medium leading-loose" placeholder="- hello (/həˈləʊ/) (int) : xin chào..."></textarea>
                </div>

            </div>
        </div>

    </main>

    <!-- Modal Chúc Mừng -->
    <div id="congratsModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300">
        <div class="modal-box bg-white rounded-3xl p-8 max-w-sm w-full mx-4 shadow-2xl transform scale-95 opacity-0 transition-all duration-300 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-yellow-100 rounded-full blur-2xl"></div>
            <div class="w-16 h-16 rounded-full bg-green-100 text-green-500 flex items-center justify-center text-4xl mx-auto mb-4 relative z-10">
                <i class="ph-fill ph-check-circle"></i>
            </div>
            <h3 class="text-2xl font-black text-center text-dash-text mb-2 relative z-10">Tuyệt vời!</h3>
            <p class="text-center text-sm text-dash-sub font-medium mb-6 relative z-10" id="congratsText">Bạn đã hoàn thành xong nhiệm vụ!</p>
            <button onclick="closeCongrats()" class="w-full bg-dash-primary hover:bg-orange-500 text-white shadow-btn py-3 rounded-xl font-bold transition-all relative z-10">Đóng</button>
        </div>
    </div>

    <script>
        // ================= DỮ LIỆU LỘ TRÌNH 100% GỐC =================
        const generateTasks = () => {
            const arr = [];
            const extensiveHint = "Mẹo: Nắm bắt ý chính, không cố dịch từng chữ sang Tiếng Việt. Tập nhái giọng (Shadowing) để quen nhịp điệu.";
            const intensiveHint = "Mẹo: Nghe kỹ, chép lại 100%. Dùng bút đỏ khoanh lại những từ nghe sai do bị nối/nuốt âm.";
            
            // --- TUẦN 1 ---
            arr.push({ d: 1, title: "Is breakfast the most important meal?", sub: "BBC 6 Min English", am: "Nghe bắt ý chính. Lần 2 Shadowing nhái giọng.", amHint: extensiveHint, amLink: "https://youtu.be/C830bmzNjDc", pm: "VOA Healthy Diet. Chép chính tả bài 01.", pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" });
            arr.push({ d: 2, title: "What to do when you can't sleep", sub: "BBC 6 Min English", am: "Nghe hiểu nguyên nhân. Shadowing đoạn giữa.", amHint: extensiveHint, amLink: "https://youtu.be/_4HKkfHYqtg", pm: "ELLLO Sleep. Chép chính tả bài 02.", pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" });
            arr.push({ d: 3, title: "Are you addicted to your smartphone?", sub: "BBC 6 Min English", am: "Nghe hiểu. Shadowing 2 phút đầu.", amHint: extensiveHint, amLink: "https://youtu.be/0Wy2JZlRp54", pm: "VOA Smartphones. Chép chính tả bài 03.", pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" });
            arr.push({ d: 4, title: "Is tourism harmful?", sub: "BBC 6 Min English", am: "Chú ý connected speech (nối âm) khi Shadowing.", amHint: extensiveHint, amLink: "https://youtu.be/E8VSFuirfzA", pm: "ELLLO Travel. Chép chính tả bài 04.", pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" });
            arr.push({ d: 5, title: "Would you invest in cryptocurrencies?", sub: "BBC 6 Min English", am: "Shadowing phần vocab recap cuối bài.", amHint: extensiveHint, amLink: "https://youtu.be/wr-v6RJ594s", pm: "VOA Bitcoin. Chép chính tả bài 05.", pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" });
            arr.push({ d: 6, title: "How can I help the environment?", sub: "BBC 6 Min English", am: "Chú ý các từ đa âm tiết dài dễ bị nuốt âm.", amHint: extensiveHint, amLink: "https://youtu.be/2Hko4TrWZYI", pm: "VOA Climate Change. Chép chính tả bài 06.", pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" });
            arr.push({ d: 7, title: "Ôn tập Tuần 1 + BBC BOX SET", sub: "Review Day", am: "Nghe Box Set 30p liên tục để luyện sức bền.", amHint: "Không cần ghi chép, chỉ thả lỏng để màng nhĩ tắm ngôn ngữ.", amLink: "https://youtu.be/gEdPVA-6rVs", pm: "Xem lại toàn bộ sổ tay lỗi sai tuần 1. Ôn Anki.", pmHint: "Tìm ra điểm yếu: Bạn hay sai ở âm đuôi hay sai vì nối âm?", pmLink: "https://dailydictation.com/daily-conversations" });
            
            // --- TUẦN 2 ---
            arr.push({ d: 8, title: "Do you lead a sedentary lifestyle?", sub: "BBC 6 Min English", am: "Shadowing recap.", amHint: extensiveHint, amLink: "https://youtu.be/Mn0mXeor0ug", pm: "VOA Grammar. Chép chính tả bài 08.", pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" });
            arr.push({ d: 9, title: "Why do we feel awkward?", sub: "BBC 6 Min English", am: "Cố nhái giọng mà KHÔNG nhìn script.", amHint: extensiveHint, amLink: "https://youtu.be/_LlyKiROzhU", pm: "ELLLO Emotions. Chép chính tả bài 09.", pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" });
            arr.push({ d: 10, title: "Is gaming a sport?", sub: "BBC 6 Min English", am: "Shadowing phần debate tranh luận.", amHint: extensiveHint, amLink: "https://youtu.be/GVfJi0dpwB0", pm: "VOA eSports. Chép chính tả bài 10.", pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" });
            arr.push({ d: 11, title: "Street food: Why is it popular?", sub: "BBC Lifestyle", am: "Nghe BBC Lifestyle Box Set.", amHint: extensiveHint, amLink: "https://youtu.be/b5DOQ7iOzO4", pm: "ELLLO Food. Chép chính tả bài 11.", pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" });
            arr.push({ d: 12, title: "Mental health in the workplace", sub: "BBC Language", am: "BBC Box Set Language.", amHint: extensiveHint, amLink: "https://youtu.be/fcN0BXzK8bg", pm: "VOA Health. Chép chính tả bài 12.", pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" });
            arr.push({ d: 13, title: "Would you like a robot companion?", sub: "BBC Tech", am: "BBC Box Set Tech.", amHint: extensiveHint, amLink: "https://youtu.be/MXCrPmVuXjs", pm: "VOA Tech. Chép chính tả bài 13.", pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" });
            arr.push({ d: 14, title: "Review Tuần 2 + Technology Box Set", sub: "Review Day", am: "Nghe 30p chủ đề Tech.", amHint: "Luyện sức bền.", amLink: "https://youtu.be/rnBQXmO_StE", pm: "Dictation 14 + Nghe lại Ngày 1.", pmHint: "So sánh xem mình nghe bài Ngày 1 có rõ từng chữ hơn trước không.", pmLink: "https://dailydictation.com/daily-conversations" });
            
            // --- TUẦN 3 & 4 ---
            const d15to21 = ["How important is play?","Do you like garlic?","Are we too fixated on protein?","What makes a good citizen?","Have you ever seen a whale?","How are influencers affecting politics?","Review tuần 3 + BBC Box Set Lifestyle"];
            d15to21.forEach((t, i) => arr.push({ d: 15+i, title: t, sub: "Tháng 1 - Tuần 3", am: "Nghe và Shadowing BBC 6 Min.", amHint: extensiveHint, amLink: "https://youtube.com/@bbclearningenglish", pm: `Daily Dictation Bài ${15+i}`, pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" }));
            
            const d22to30 = ["Dining etiquette?","BBC Human Emotions Box Set","VOA - Future of Work","BBC: Future of food","ELLLO Mixer chủ đề tự chọn","ELLLO Mixer chủ đề tự chọn","ELLLO Mixer chủ đề tự chọn","British Council B1 Listening","Tổng kết tháng 1 — Đo tiến bộ"];
            d22to30.forEach((t, i) => arr.push({ d: 22+i, title: t, sub: "Tháng 1 - Tuần 4", am: "Nghe và Shadowing tổng hợp.", amHint: extensiveHint, amLink: "https://youtube.com/@bbclearningenglish", pm: `Daily Dictation Bài ${22+i}`, pmHint: intensiveHint, pmLink: "https://dailydictation.com/daily-conversations" }));

            // --- THÁNG 2 ---
            const t2 = [
                {n:31,t:'All Ears English: Ep.1 — Small Talk'},{n:32,t:'All Ears English: Ep.2 — Compliments'},{n:33,t:'All Ears English: Ep.3 — Opinions'},{n:34,t:'Ted-Ed: How languages evolve'},{n:35,t:'VOA: The Science of Sleep'},{n:36,t:'Phim: 15 phút EN subtitles'},{n:37,t:'Review tuần 5'},{n:38,t:'All Ears English: American slang'},{n:39,t:'Ted-Ed: How do animals experience pain?'},{n:40,t:'All Ears English: Disagree politely'},{n:41,t:'Ted-Ed: The science of attraction'},{n:42,t:'All Ears English: Connected speech'},{n:43,t:'Phim: 15 phút EN subtitles'},{n:44,t:'Review tuần 6'}
            ];
            t2.forEach(x => arr.push({ d: x.n, title: x.t, sub: "Tốc độ bản xứ", am: "Podcast tốc độ người Mỹ, nói lướt nhiều.", amHint: "Bắt đầu làm quen với cách người bản xứ nói lướt, không nhấn mạnh mọi từ.", amLink: "https://www.allearsenglish.com/", pm: "Chép chính tả trên YouTube Video.", pmHint: "Cấp độ khó hơn hội thoại chậm. Cố gắng chép nhiều nhất có thể.", pmLink: "https://dailydictation.com/youtube-videos" }));
            
            for(let i=45; i<=60; i++) arr.push({ d: i, title: `Tháng 2 Bài ${i}`, sub: "Tốc độ bản xứ", am: "All Ears / Culips tốc độ chuẩn.", amHint: "Chú ý idioms và phrasal verbs.", amLink: "https://www.allearsenglish.com/", pm: "British Council / Ted-Ed Dictation.", pmHint: "Ghi chú lại những từ vựng học thuật vào sổ tay.", pmLink: "https://dailydictation.com/youtube-videos" });

            // --- THÁNG 3 ---
            for(let i=61; i<=90; i++) arr.push({ d: i, title: `Khổ luyện Bài ${i}`, sub: "Nghe Tự Nhiên", am: "Kurzgesagt / NPR (Không giảm tốc độ).", amHint: "Tuyệt đối không giảm tốc độ. Tập trung đoán nghĩa qua ngữ cảnh.", amLink: "https://www.youtube.com/@kurzgesagt/videos", pm: "Xem phim tắt Sub / C1 Listening.", pmHint: "Cố gắng dùng não bộ để liên kết âm thanh trực tiếp với hình ảnh.", pmLink: "https://learnenglish.britishcouncil.org/skills/listening/c1-listening" });

            return arr;
        };

        const tasks = generateTasks();

        // ================= TRẠNG THÁI HỆ THỐNG =================
        let completedSessions = new Set(JSON.parse(localStorage.getItem('mastery_sessions') || '[]'));
        
        let activeStudy = { day: null, session: null, seconds: 0, required: 0 };
        let studyInterval = null;

        const getTodayStr = () => new Date().toISOString().split('T')[0];
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDateStr').innerText = new Date().toLocaleDateString('vi-VN', options);
        document.getElementById('userNotes').value = localStorage.getItem('mastery_notes') || '';

        // ================= TÍNH NĂNG TRA TỪ & PHIÊN ÂM =================
        const posMap = { noun: 'n', verb: 'v', adjective: 'adj', adverb: 'adv', pronoun: 'pron', preposition: 'prep', conjunction: 'conj', interjection: 'int' };

        async function lookupWord() {
            const input = document.getElementById('dictInput').value.trim().toLowerCase();
            const resultDiv = document.getElementById('dictResult');
            
            if(!input) return;
            
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `
                <div class="dict-result-box flex justify-center text-amber-600 font-bold">
                    <i class="ph-bold ph-spinner animate-spin mr-2 text-xl"></i> Đang tra cứu...
                </div>`;

            try {
                // Fetch song song
                const [dictRes, transRes] = await Promise.all([
                    fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${input}`).catch(()=>null),
                    fetch(`https://api.mymemory.translated.net/get?q=${input}&langpair=en|vi`).catch(()=>null)
                ]);

                let phonetic = '';
                let partOfSpeech = '';
                
                if (dictRes && dictRes.ok) {
                    const data = await dictRes.json();
                    const pObj = data[0].phonetics?.find(p => p.text);
                    phonetic = pObj ? pObj.text : (data[0].phonetic || '');
                    
                    const pos = data[0].meanings[0]?.partOfSpeech || '';
                    partOfSpeech = posMap[pos] ? posMap[pos] : pos;
                }

                let viMeaning = '';
                if (transRes && transRes.ok) {
                    const tData = await transRes.json();
                    viMeaning = tData.responseData.translatedText;
                }

                if (!phonetic && !viMeaning) throw new Error();

                // Format tiếng Việt siêu ngắn gọn
                const shortVi = viMeaning.split(',')[0].split(' ').slice(0, 5).join(' ').toLowerCase();

                // Build UI exactly like the image
                resultDiv.innerHTML = `
                    <div class="dict-result-box">
                        <div class="text-[#F59E0B] text-[22px] font-extrabold mb-1">
                            ${input} ${phonetic ? `<span class="text-sm text-gray-400 font-normal italic ml-1">${phonetic}</span>` : ''}
                        </div>
                        <div class="text-[#1E293B] font-bold text-[15px] mb-3">
                            ${shortVi} ${partOfSpeech ? `<span class="text-gray-400 font-normal italic ml-1">(${partOfSpeech})</span>` : ''}
                        </div>
                        <button onclick="addWordToNotes('${input}', '${phonetic}', '${partOfSpeech}', '${shortVi}')" class="btn-outline-amber text-xs flex items-center gap-1 w-max">
                            + Lưu vào sổ tay
                        </button>
                    </div>
                `;
            } catch (err) {
                resultDiv.innerHTML = `<div class="dict-result-box text-red-500 font-medium">Không tìm thấy thông tin từ này.</div>`;
            }
        }

        function addWordToNotes(word, phonetic, pos, meaning) {
            const noteArea = document.getElementById('userNotes');
            const currentVal = noteArea.value;
            // Format: - word (/phonetic/) (pos) : meaning
            let entry = `- ${word}`;
            if(phonetic) entry += ` (${phonetic})`;
            if(pos) entry += ` (${pos})`;
            entry += ` : ${meaning}`;
            
            noteArea.value = currentVal ? currentVal + '\n' + entry : entry;
            saveNotes();
            document.getElementById('dictInput').value = '';
            document.getElementById('dictResult').classList.add('hidden');
        }

        function saveNotes() {
            const val = document.getElementById('userNotes').value;
            localStorage.setItem('mastery_notes', val);
            const btn = document.getElementById('saveNoteBtn');
            btn.innerText = "Đã lưu ✓";
            setTimeout(() => btn.innerText = "Lưu lại", 2000);
        }

        // ================= LOGIC HỌC & ĐỒNG HỒ RÀNG BUỘC =================
        function startStudy(day, session) {
            // Ngăn việc học nếu đã hoàn thành (không cần reset timer)
            if (completedSessions.has(`${day}-${session}`)) return;

            if (studyInterval) clearInterval(studyInterval);
            
            // Set thời gian yêu cầu (Bản test: Sáng 30s, Tối 60s)
            activeStudy = { day, session, seconds: 0, required: session === 'am' ? 30 : 60 };
            
            document.getElementById('timerLabel').innerText = `ĐANG HỌC N-${day} CA ${session.toUpperCase()}`;
            
            studyInterval = setInterval(() => {
                activeStudy.seconds++;
                const m = Math.floor(activeStudy.seconds / 60).toString().padStart(2, '0');
                const s = (activeStudy.seconds % 60).toString().padStart(2, '0');
                document.getElementById('timerDisplay').innerText = `${m}:${s}`;
                
                // Đủ giờ -> Unlock nút
                if (activeStudy.seconds >= activeStudy.required) {
                    unlockTaskBtn(activeStudy.day, activeStudy.session);
                }
            }, 1000);
        }

        function unlockTaskBtn(day, session) {
            const btn = document.getElementById(`btn-claim-${day}-${session}`);
            if (btn && btn.disabled) {
                btn.disabled = false;
                btn.className = "w-full mt-3 py-2.5 rounded-xl text-xs font-bold bg-white border-2 border-dash-primary text-dash-primary hover:bg-amber-50 transition-all flex justify-center items-center gap-1 shadow-sm";
                btn.innerHTML = `Hoàn Thành Ca ${session === 'am' ? 'Sáng' : 'Tối'}`;
            }
        }

        window.claimTask = function(day, session, e) {
            e.stopPropagation();
            const taskId = `${day}-${session}`;

            if (!completedSessions.has(taskId)) {
                completedSessions.add(taskId);
                
                // Tạm dừng timer
                if(studyInterval) clearInterval(studyInterval);
                document.getElementById('timerLabel').innerText = `Thời gian học`;
                
                // Hiệu ứng pháo hoa
                const rect = e.target.getBoundingClientRect();
                confetti({
                    particleCount: 50, spread: 60,
                    origin: { x: (rect.left + rect.width/2)/window.innerWidth, y: (rect.top + rect.height/2)/window.innerHeight },
                    colors: ['#F59E0B', '#10B981']
                });

                document.getElementById('congratsText').innerText = `Tuyệt vời! Bạn đã hoàn thành Ca ${session === 'am' ? 'Sáng' : 'Tối'}. Đồng hồ đã tự động dừng để báo lưu kết quả.`;
                document.getElementById('congratsModal').classList.add('modal-enter');

                localStorage.setItem('mastery_sessions', JSON.stringify([...completedSessions]));
                renderAll();
            }
        };

        window.closeCongrats = function() { document.getElementById('congratsModal').classList.remove('modal-enter'); }

        // ================= KHU VƯỜN TIẾN ĐỘ =================
        function updateTreeProgress(completedDaysCount) {
            const treeIcon = document.getElementById('treeIcon');
            const treeName = document.getElementById('treeName');
            
            if (completedDaysCount === 0) {
                treeIcon.innerText = '🌱'; treeName.innerText = 'Hạt Mầm';
            } else if (completedDaysCount <= 10) {
                treeIcon.innerText = '🌿'; treeName.innerText = 'Cây Non';
            } else if (completedDaysCount <= 30) {
                treeIcon.innerText = '🪴'; treeName.innerText = 'Cây Đang Lớn';
            } else if (completedDaysCount <= 60) {
                treeIcon.innerText = '🌳'; treeName.innerText = 'Cây Trưởng Thành';
            } else {
                treeIcon.innerText = '🍎'; treeName.innerText = 'Đơm Hoa Kết Trái';
            }
        }

        // ================= KẾT XUẤT GIAO DIỆN =================
        function getCompletedDaysCount() {
            let count = 0;
            for(let i=1; i<=90; i++) {
                if(completedSessions.has(`${i}-am`) && completedSessions.has(`${i}-pm`)) count++;
            }
            return count;
        }

        function getUnlockedDay() {
            return getCompletedDaysCount() + 1;
        }

        function createHTMLCard(t) {
            const amDone = completedSessions.has(`${t.d}-am`);
            const pmDone = completedSessions.has(`${t.d}-pm`);
            const isFullDone = amDone && pmDone;
            
            const unlockedDay = getUnlockedDay();
            const isLocked = t.d > unlockedDay;
            
            const stateClass = isFullDone ? 'completed' : (isLocked ? 'locked' : '');
            
            const renderSessionButton = (sessionType, isSessionDone) => {
                if (isSessionDone) {
                    return `<button class="w-full mt-3 py-2.5 rounded-xl text-xs font-bold bg-green-50 text-dash-success border border-green-200 flex justify-center items-center gap-1 cursor-default"><i class="ph-bold ph-check"></i> Đã Xong</button>`;
                }
                
                // Nếu đang trong quá trình học và đã đủ giờ (unlock tạm thời trên giao diện)
                const isUnlockedNow = activeStudy.day === t.d && activeStudy.session === sessionType && activeStudy.seconds >= (sessionType === 'am' ? 30 : 60);
                
                if (isUnlockedNow) {
                    return `<button id="btn-claim-${t.d}-${sessionType}" onclick="claimTask(${t.d}, '${sessionType}', event)" class="w-full mt-3 py-2.5 rounded-xl text-xs font-bold bg-white border-2 border-dash-primary text-dash-primary hover:bg-amber-50 transition-all flex justify-center items-center gap-1 shadow-sm">Hoàn Thành Ca ${sessionType === 'am' ? 'Sáng' : 'Tối'}</button>`;
                } else {
                    const reqTime = sessionType === 'am' ? '30s' : '1 phút';
                    return `<button id="btn-claim-${t.d}-${sessionType}" onclick="claimTask(${t.d}, '${sessionType}', event)" class="w-full mt-3 py-2.5 rounded-xl text-xs font-bold bg-gray-100 text-gray-400 cursor-not-allowed flex justify-center items-center gap-1 transition-all" disabled><i class="ph-bold ph-lock-key"></i> Học ${reqTime} để Mở khóa</button>`;
                }
            };

            return `
            <div id="q-${t.d}" class="dashboard-card quest-card mb-4 ${stateClass}">
                <div class="p-5 cursor-pointer flex items-center justify-between gap-4" onclick="${!isLocked ? `window.toggleCard(${t.d})` : ''}">
                    <div class="flex items-center gap-4 flex-1">
                        <div class="w-14 h-14 rounded-2xl ${isFullDone ? 'bg-green-50 text-dash-success' : 'bg-amber-50 text-dash-primary'} flex flex-col items-center justify-center font-bold shrink-0 transition-colors">
                            <span class="text-[10px] uppercase opacity-70">Ngày</span>
                            <span class="text-xl leading-none font-extrabold">${t.d}</span>
                        </div>
                        <div>
                            <h3 class="font-extrabold text-base text-dash-text line-clamp-1">${t.title}</h3>
                            <p class="text-xs text-dash-sub mt-1 font-medium">${t.sub}</p>
                        </div>
                    </div>
                    ${!isLocked ? `<i class="ph-bold ph-caret-down text-dash-sub text-lg transition-transform" id="c-${t.d}"></i>` : '<i class="ph-bold ph-lock-key text-gray-300 text-lg"></i>'}
                </div>
                
                ${!isLocked ? `
                <div class="quest-content">
                    <div class="quest-inner px-5 pb-5">
                        <div class="pt-4 border-t border-gray-100 flex flex-col md:flex-row gap-4">
                            
                            <!-- CA SÁNG -->
                            <div class="flex-1 bg-white border border-gray-200 rounded-xl p-4 shadow-sm hover:border-amber-300 transition-colors relative overflow-hidden">
                                ${amDone ? '<div class="absolute inset-0 bg-green-50/40 pointer-events-none"></div>' : ''}
                                <div class="flex justify-between items-center mb-3 relative z-10">
                                    <div class="font-extrabold text-amber-600 flex items-center gap-1.5 uppercase text-xs"><i class="ph-fill ph-sun text-base"></i> Ca Sáng</div>
                                    <span class="text-[9px] uppercase font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded border border-gray-200">Extensive</span>
                                </div>
                                <p class="text-sm font-medium text-gray-800 mb-2 relative z-10 leading-relaxed">${t.am}</p>
                                <p class="text-[11px] text-gray-500 italic mb-4 relative z-10 leading-relaxed">${t.amHint}</p>
                                <div class="relative z-10">
                                    <a href="${t.amLink}" target="_blank" onclick="startStudy(${t.d}, 'am'); event.stopPropagation();" class="inline-flex items-center gap-1 text-xs font-bold text-amber-600 hover:underline bg-amber-50 px-3 py-1.5 rounded-lg">
                                        Mở bài học <i class="ph-bold ph-arrow-square-out"></i>
                                    </a>
                                    ${renderSessionButton('am', amDone)}
                                </div>
                            </div>

                            <!-- CA TỐI -->
                            <div class="flex-1 bg-white border border-gray-200 rounded-xl p-4 shadow-sm hover:border-amber-300 transition-colors relative overflow-hidden">
                                ${pmDone ? '<div class="absolute inset-0 bg-green-50/40 pointer-events-none"></div>' : ''}
                                <div class="flex justify-between items-center mb-3 relative z-10">
                                    <div class="font-extrabold text-indigo-600 flex items-center gap-1.5 uppercase text-xs"><i class="ph-fill ph-moon-stars text-base"></i> Ca Tối</div>
                                    <span class="text-[9px] uppercase font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded border border-gray-200">Intensive</span>
                                </div>
                                <p class="text-sm font-medium text-gray-800 mb-2 relative z-10 leading-relaxed">${t.pm}</p>
                                <p class="text-[11px] text-gray-500 italic mb-4 relative z-10 leading-relaxed">${t.pmHint}</p>
                                <div class="relative z-10">
                                    <a href="${t.pmLink}" target="_blank" onclick="startStudy(${t.d}, 'pm'); event.stopPropagation();" class="inline-flex items-center gap-1 text-xs font-bold text-indigo-600 hover:underline bg-indigo-50 px-3 py-1.5 rounded-lg">
                                        Mở bài học <i class="ph-bold ph-arrow-square-out"></i>
                                    </a>
                                    ${renderSessionButton('pm', pmDone)}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
                ` : ''}
            </div>`;
        }

        window.toggleCard = function(d) {
            const c = document.getElementById(`q-${d}`);
            const a = document.getElementById(`c-${d}`);
            if(c.classList.contains('locked')) return;
            
            c.classList.toggle('open');
            if(c.classList.contains('open')) a.classList.add('rotate-180');
            else a.classList.remove('rotate-180');
        };

        window.switchTab = function(id, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active', 'bg-dash-primary', 'text-white', 'shadow-btn');
                b.classList.add('text-dash-sub', 'bg-transparent');
            });
            document.getElementById(id).classList.remove('hidden');
            btn.classList.remove('text-dash-sub', 'bg-transparent');
            btn.classList.add('active', 'bg-dash-primary', 'text-white', 'shadow-btn');
        };

        function renderAll() {
            let h1='', h2='', h3='';
            tasks.forEach(t => {
                const html = createHTMLCard(t);
                if(t.d <= 30) h1 += html;
                else if(t.d <= 60) h2 += html;
                else h3 += html;
            });
            document.getElementById('phase1-container').innerHTML = h1;
            document.getElementById('phase2-container').innerHTML = h2;
            document.getElementById('phase3-container').innerHTML = h3;

            // Tiến độ Cây & Streak
            const completedDaysCount = getCompletedDaysCount();
            updateTreeProgress(completedDaysCount);
            document.getElementById('streakCount').innerText = completedDaysCount;
            
            // Tự động mở bài đang học
            const unlockedDay = getUnlockedDay();
            if(unlockedDay <= 90) {
                setTimeout(() => {
                    const card = document.getElementById(`q-${unlockedDay}`);
                    if(card && !card.classList.contains('open')) {
                        toggleCard(unlockedDay);
                    }
                }, 100);
            }
        }

        renderAll();

    </script>
</body>
</html>
